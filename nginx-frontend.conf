# Frontend Configuration for fergana.cdcgroup.uz
# Location: /etc/nginx/sites-available/fergana.cdcgroup.uz

server {
    listen 80;
    server_name fergana.cdcgroup.uz;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fergana.cdcgroup.uz;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/fergana.cdcgroup.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fergana.cdcgroup.uz/privkey.pem;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Document Root
    root /var/www/html/smartcity;
    index index.html;

    # Logging
    access_log /var/log/nginx/fergana-access.log;
    error_log /var/log/nginx/fergana-error.log;

    # Main Location
    location / {
        try_files $uri $uri/ /index.html;
        
        # CORS headers (if needed for local development)
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Static Assets (with caching)
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Robots
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
