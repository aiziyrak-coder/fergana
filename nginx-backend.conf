# Backend Configuration for ferganaapi.cdcgroup.uz
# Location: /etc/nginx/sites-available/ferganaapi.cdcgroup.uz

server {
    listen 80;
    server_name ferganaapi.cdcgroup.uz;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ferganaapi.cdcgroup.uz;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/ferganaapi.cdcgroup.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ferganaapi.cdcgroup.uz/privkey.pem;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # File Upload Size
    client_max_body_size 20M;
    
    # Timeouts
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # Logging
    access_log /var/log/nginx/ferganaapi-access.log;
    error_log /var/log/nginx/ferganaapi-error.log;

    # Proxy to Django/Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' 'https://fergana.cdcgroup.uz' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-CSRFToken' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://fergana.cdcgroup.uz' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-CSRFToken' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }
    }

    # Static Files
    location /static/ {
        alias /var/www/smartcity-backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media Files
    location /media/ {
        alias /var/www/smartcity-backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Admin Static Files
    location /admin/static/ {
        alias /var/www/smartcity-backend/static/;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
