# HTTPS frontend — uses SAN cert issued for fergana.ziyrak.org + ferganaapi.ziyrak.org
server {
    listen 80;
    listen [::]:80;
    server_name fergana.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fergana.ziyrak.org;

    ssl_certificate /etc/letsencrypt/live/fergana.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fergana.ziyrak.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/fergana.ziyrak.org;
    index index.html;

    access_log /var/log/nginx/fergana-ziyrak-fe-access.log;
    error_log /var/log/nginx/fergana-ziyrak-fe-error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
