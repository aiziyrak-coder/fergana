# HTTP + ACME only — replaced by fergana.ziyrak.org.ssl.conf after certificates exist.
server {
    listen 80;
    listen [::]:80;
    server_name fergana.ziyrak.org;

    root /var/www/fergana.ziyrak.org;
    index index.html;

    access_log /var/log/nginx/fergana-ziyrak-fe-access.log;
    error_log /var/log/nginx/fergana-ziyrak-fe-error.log;

    # ACME must be plain files (no SPA fallback); world-readable for nginx www-data
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
