# HTTP + ACME only — replaced by ferganaapi.ziyrak.org.ssl.conf after certificates exist.
server {
    listen 80;
    listen [::]:80;
    server_name ferganaapi.ziyrak.org;

    access_log /var/log/nginx/fergana-ziyrak-api-access.log;
    error_log /var/log/nginx/fergana-ziyrak-api-error.log;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
