server {
    listen 80;
    listen [::]:80;
    server_name ferganaapi.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ferganaapi.ziyrak.org;

    ssl_certificate /etc/letsencrypt/live/fergana.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fergana.ziyrak.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    access_log /var/log/nginx/fergana-ziyrak-api-access.log;
    error_log /var/log/nginx/fergana-ziyrak-api-error.log;

    location /static/ {
        alias /opt/fergana-smartcity/repo/backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /opt/fergana-smartcity/repo/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
